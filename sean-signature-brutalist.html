<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- AFTERHARVEST SIGNATURE - Brutalist Minimal -->
    <table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; max-width: 500px; margin: 0; border-spacing: 0;">
        <tr>
            <td style="vertical-align: top;">
                <!-- Large Name Block -->
                <div style="margin-bottom: 3px;">
                    <span style="font-size: 24px; font-weight: 700; color: #1A1A1A; letter-spacing: -0.5px; line-height: 1; display: inline-block;">Sean</span>
                    <span style="font-size: 24px; font-weight: 300; color: #7B6B9E; letter-spacing: -0.5px; line-height: 1; display: inline-block; margin-left: 6px;">Canela</span>
                </div>

                <!-- Title + Logo Row -->
                <table cellpadding="0" cellspacing="0" border="0" style="margin-top: 8px;">
                    <tr>
                        <td style="vertical-align: middle; padding-right: 10px; border-right: 2px solid rgba(123,107,158,0.3);">
                            <div style="font-size: 10px; font-weight: 600; color: #7B6B9E; letter-spacing: 1.5px; text-transform: uppercase; padding-right: 10px;">
                                Founder
                            </div>
                        </td>
                        <td style="vertical-align: middle; padding-left: 10px;">
                            <img src="data:image/png;base64,YOUR_LOGO_BASE64" alt="Afterharvest" style="height: 14px; width: auto; display: block; opacity: 0.8;">
                        </td>
                    </tr>
                </table>
            </td>

            <!-- Photo - Far Right -->
            <td style="vertical-align: middle; padding-left: 32px;">
                <div style="position: relative;">
                    <img src="data:image/jpeg;base64,YOUR_PHOTO_BASE64" alt="Sean Canela" style="width: 70px; height: 70px; border-radius: 50%; display: block; object-fit: cover; border: 3px solid rgba(123,107,158,0.2); box-shadow: 0 6px 16px rgba(123,107,158,0.18);">
                    <!-- Offset Geometric Shape -->
                    <div style="position: absolute; top: -4px; left: -4px; width: 16px; height: 16px; background: #D4A5A5; border-radius: 2px; transform: rotate(45deg); opacity: 0.7;"></div>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
