<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- AFTERHARVEST SIGNATURE - Asymmetric Balance (Alternative) -->
    <table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; max-width: 500px; margin: 0; border-spacing: 0;">
        <tr>
            <!-- Vertical Gradient Accent -->
            <td style="vertical-align: top; padding-right: 20px;">
                <div style="width: 2px; height: 140px; background: linear-gradient(180deg, #7B6B9E 0%, #D4A5A5 60%, rgba(212,165,165,0.2) 100%); border-radius: 1px;"></div>
            </td>

            <!-- Main Content Area -->
            <td style="vertical-align: top;">
                <table cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
                    <!-- Row 1: Name + Photo -->
                    <tr>
                        <td style="vertical-align: top; padding-right: 24px;">
                            <!-- Name - Extra Large -->
                            <div style="margin-bottom: 8px;">
                                <div style="font-size: 24px; font-weight: 700; color: #1A1A1A; letter-spacing: -0.4px; line-height: 1;">
                                    Sean Canela
                                </div>
                            </div>

                            <!-- Title - Refined Caps -->
                            <div style="margin-bottom: 16px;">
                                <span style="font-size: 10px; font-weight: 600; color: #6B6B6B; letter-spacing: 1.6px; text-transform: uppercase;">FOUNDER OF AFTERHARVEST</span>
                            </div>

                            <!-- Separator Line -->
                            <div style="margin-bottom: 16px;">
                                <table cellpadding="0" cellspacing="0" border="0">
                                    <tr>
                                        <td style="width: 30px; height: 1px; background: #7B6B9E; opacity: 0.5;"></td>
                                        <td style="width: 4px;"></td>
                                        <td style="width: 8px; height: 1px; background: #D4A5A5; opacity: 0.5;"></td>
                                    </tr>
                                </table>
                            </div>

                            <!-- Logo - Full Prominence -->
                            <div>
                                <img src="data:image/png;base64,YOUR_LOGO_BASE64" alt="Afterharvest" style="width: 135px; height: auto; display: block; opacity: 0.8;">
                            </div>
                        </td>

                        <!-- Circular Photo - Right Aligned -->
                        <td style="vertical-align: middle; text-align: right;">
                            <div style="position: relative; display: inline-block;">
                                <!-- Perfect Circle Photo -->
                                <img src="data:image/jpeg;base64,YOUR_PHOTO_BASE64" alt="Sean Canela" style="width: 105px; height: 105px; border-radius: 50%; display: block; object-fit: cover; border: 2.5px solid rgba(123,107,158,0.15); box-shadow: 0 6px 18px rgba(123,107,158,0.25), 0 2px 6px rgba(0,0,0,0.08);">

                                <!-- Gradient Ring Accent -->
                                <div style="position: absolute; top: -3px; right: -3px; width: 20px; height: 20px; background: linear-gradient(135deg, #D4A5A5 0%, #7B6B9E 100%); border-radius: 50%; opacity: 0.7; border: 2px solid #FFFFFF;"></div>
                            </div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
