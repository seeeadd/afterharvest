<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- AFTERHARVEST SIGNATURE - Kinfolk Editorial Style -->
    <table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; max-width: 440px; margin: 0; border-spacing: 0; background: linear-gradient(135deg, rgba(123,107,158,0.02) 0%, rgba(212,165,165,0.02) 100%); padding: 18px 20px; border-radius: 4px;">
        <tr>
            <td style="vertical-align: top; padding-right: 20px;">
                <!-- Photo with Artistic Border -->
                <div style="position: relative; display: inline-block;">
                    <img src="data:image/jpeg;base64,YOUR_PHOTO_BASE64" alt="Sean Canela" style="width: 74px; height: 74px; border-radius: 6px; display: block; object-fit: cover; border: 2px solid rgba(255,255,255,0.9); box-shadow: 0 2px 12px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(123,107,158,0.1);">
                    <!-- Floating Accent -->
                    <div style="position: absolute; bottom: -4px; right: -4px; width: 14px; height: 14px; background: #D4A5A5; border-radius: 50%; border: 2px solid #FFFFFF; box-shadow: 0 2px 6px rgba(0,0,0,0.15);"></div>
                </div>
            </td>

            <td style="vertical-align: middle; padding-left: 6px;">
                <!-- Name with Refined Spacing -->
                <div style="font-size: 20px; font-weight: 600; color: #2C2C2C; letter-spacing: 0.2px; line-height: 1.15; margin-bottom: 6px;">
                    Sean Canela
                </div>

                <!-- Minimal Divider -->
                <div style="width: 35px; height: 1px; background: linear-gradient(90deg, rgba(123,107,158,0.4) 0%, rgba(123,107,158,0.1) 100%); margin-bottom: 7px;"></div>

                <!-- Title with Integrated Logo -->
                <div style="margin-bottom: 4px;">
                    <span style="font-size: 11px; font-weight: 500; color: #7B6B9E; letter-spacing: 1px; text-transform: uppercase; line-height: 1.4;">Founder of</span>
                </div>
                <div>
                    <img src="data:image/png;base64,YOUR_LOGO_BASE64" alt="Afterharvest" style="height: 15px; width: auto; display: block; opacity: 0.75; margin-top: 4px;">
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
