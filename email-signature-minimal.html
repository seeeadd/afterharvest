<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <!-- ULTRA-MINIMAL VERSION (No Logo) -->
    <table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; font-size: 14px; line-height: 1.5; color: #4A4A4A; max-width: 450px;">
        <tr>
            <td style="vertical-align: top; padding-right: 16px;">
                <!-- Profile Photo (Circular) -->
                <img src="data:image/png;base64,YOUR_PROFILE_PHOTO_BASE64_HERE" alt="Profile" style="width: 64px; height: 64px; border-radius: 50%; display: block; object-fit: cover;">
            </td>
            <td style="vertical-align: top; padding-left: 8px;">
                <!-- Name -->
                <div style="font-size: 17px; font-weight: 600; color: #4A4A4A; margin: 0 0 2px 0; line-height: 1.3;">
                    Your Name
                </div>

                <!-- Title -->
                <div style="font-size: 14px; color: #7B6B9E; margin: 0 0 6px 0; line-height: 1.4;">
                    Your Title
                </div>

                <!-- Company & Description (Combined) -->
                <div style="font-size: 13px; color: #6B6B6B; margin: 0; line-height: 1.5;">
                    Afterharvest · Customer retention for community builders
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
