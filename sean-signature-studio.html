<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- AFTERHARVEST SIGNATURE - Asymmetric Studio -->
    <table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; max-width: 480px; margin: 0; border-spacing: 0;">
        <tr>
            <td>
                <!-- Top row: Name -->
                <table cellpadding="0" cellspacing="0" border="0" style="width: 100%; margin-bottom: 10px;">
                    <tr>
                        <td style="vertical-align: middle;">
                            <div style="font-size: 28px; font-weight: 700; color: #1A1A1A; letter-spacing: -0.6px; line-height: 1;">
                                Sean Canela
                            </div>
                        </td>
                        <!-- Color accent squares -->
                        <td style="vertical-align: middle; text-align: right;">
                            <table cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td style="width: 6px; height: 6px; background: #3D5A4C; opacity: 0.6; border-radius: 1px;"></td>
                                    <td style="width: 4px;"></td>
                                    <td style="width: 6px; height: 6px; background: #7B6B9E; opacity: 0.6; border-radius: 1px;"></td>
                                    <td style="width: 4px;"></td>
                                    <td style="width: 6px; height: 6px; background: #D4A5A5; opacity: 0.6; border-radius: 1px;"></td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>

                <!-- Main content row -->
                <table cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
                    <tr>
                        <!-- Left: Photo -->
                        <td style="vertical-align: top; padding-right: 24px;">
                            <!-- Photo container with offset background -->
                            <table cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td style="position: relative;">
                                        <!-- Background offset block -->
                                        <table cellpadding="0" cellspacing="0" border="0" style="position: absolute; top: 8px; left: -8px;">
                                            <tr>
                                                <td style="width: 110px; height: 110px; background: linear-gradient(135deg, rgba(61,90,76,0.08) 0%, rgba(123,107,158,0.08) 100%); border-radius: 50%;"></td>
                                            </tr>
                                        </table>
                                        <!-- Actual photo -->
                                        <img src="data:image/jpeg;base64,YOUR_PHOTO_BASE64" alt="Sean Canela" style="width: 110px; height: 110px; border-radius: 50%; display: block; object-fit: cover; border: 4px solid #FFFFFF; box-shadow: 0 8px 24px rgba(61,90,76,0.18), 0 2px 8px rgba(0,0,0,0.08); position: relative; z-index: 1;">
                                    </td>
                                </tr>
                            </table>
                        </td>

                        <!-- Right: Text + Logo -->
                        <td style="vertical-align: middle;">
                            <!-- Title with gradient background -->
                            <div style="margin-bottom: 14px;">
                                <table cellpadding="0" cellspacing="0" border="0">
                                    <tr>
                                        <td style="padding: 6px 12px 6px 0; background: linear-gradient(90deg, rgba(123,107,158,0.06) 0%, transparent 100%);">
                                            <span style="font-size: 9px; font-weight: 600; color: #3D5A4C; letter-spacing: 2px; text-transform: uppercase;">Founder of Afterharvest</span>
                                        </td>
                                    </tr>
                                </table>
                            </div>

                            <!-- Thin rule -->
                            <div style="margin-bottom: 14px;">
                                <div style="width: 100%; height: 1px; background: linear-gradient(90deg, #7B6B9E 0%, #D4A5A5 50%, transparent 100%); opacity: 0.4;"></div>
                            </div>

                            <!-- Logo -->
                            <div>
                                <img src="data:image/png;base64,YOUR_LOGO_BASE64" alt="Afterharvest" style="width: 130px; height: auto; display: block; opacity: 0.85;">
                            </div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
