<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- AFTERHARVEST SIGNATURE - Editorial Luxe (Refined) -->
    <table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; max-width: 500px; margin: 0; border-spacing: 0;">
        <tr>
            <!-- Circular Photo - Clean Treatment -->
            <td style="vertical-align: middle; padding-right: 30px;">
                <table cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <td style="position: relative;">
                            <!-- Main Photo -->
                            <img src="data:image/jpeg;base64,YOUR_PHOTO_BASE64" alt="Sean Canela" style="width: 105px; height: 105px; border-radius: 50%; display: block; object-fit: cover; border: 3px solid #FFFFFF; box-shadow: 0 6px 20px rgba(61,90,76,0.18), 0 2px 8px rgba(123,107,158,0.12);">
                        </td>
                    </tr>
                    <!-- Subtle accent line below photo -->
                    <tr>
                        <td style="padding-top: 8px;">
                            <table cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td style="width: 20px; height: 2px; background: #3D5A4C; opacity: 0.4;"></td>
                                    <td style="width: 8px;"></td>
                                    <td style="width: 35px; height: 2px; background: #7B6B9E; opacity: 0.3;"></td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>

            <!-- Text Content -->
            <td style="vertical-align: middle;">
                <!-- Name - Split Color -->
                <div style="margin-bottom: 8px;">
                    <span style="font-size: 26px; font-weight: 700; color: #1A1A1A; letter-spacing: -0.4px; line-height: 1;">Sean</span>
                    <span style="font-size: 26px; font-weight: 300; color: #3D5A4C; letter-spacing: 0.3px; line-height: 1; margin-left: 5px;">Canela</span>
                </div>

                <!-- Simple separator line -->
                <div style="margin-bottom: 10px;">
                    <div style="width: 45px; height: 1px; background: linear-gradient(90deg, #7B6B9E 0%, #D4A5A5 100%); opacity: 0.5;"></div>
                </div>

                <!-- Title - Clean, No Background -->
                <div style="margin-bottom: 16px;">
                    <span style="font-size: 9px; font-weight: 600; color: #7B6B9E; letter-spacing: 1.6px; text-transform: uppercase; line-height: 1;">FOUNDER OF AFTERHARVEST</span>
                </div>

                <!-- Logo - Prominent -->
                <div>
                    <img src="data:image/png;base64,YOUR_LOGO_BASE64" alt="Afterharvest" style="width: 135px; height: auto; display: block; opacity: 0.8;">
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
