<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- AFTERHARVEST SIGNATURE - Editorial Luxe -->
    <table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; max-width: 520px; margin: 0; border-spacing: 0;">
        <tr>
            <!-- Photo with Creative Frame -->
            <td style="vertical-align: middle; padding-right: 34px;">
                <table cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <!-- Left accent strip -->
                        <td style="width: 3px; background: linear-gradient(180deg, #3D5A4C 0%, #7B6B9E 100%); border-radius: 2px 0 0 2px;"></td>
                        <!-- Photo cell -->
                        <td style="padding: 6px; background: linear-gradient(135deg, rgba(123,107,158,0.04) 0%, rgba(212,165,165,0.04) 100%);">
                            <table cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td>
                                        <!-- Main circular photo -->
                                        <img src="data:image/jpeg;base64,YOUR_PHOTO_BASE64" alt="Sean Canela" style="width: 100px; height: 100px; border-radius: 50%; display: block; object-fit: cover; border: 2px solid rgba(255,255,255,0.9); box-shadow: 0 6px 20px rgba(61,90,76,0.15), 0 2px 8px rgba(123,107,158,0.1);">
                                    </td>
                                </tr>
                                <!-- Bottom accent bar -->
                                <tr>
                                    <td style="padding-top: 6px;">
                                        <table cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
                                            <tr>
                                                <td style="width: 35%; height: 2px; background: #D4A5A5; opacity: 0.6;"></td>
                                                <td style="width: 5%;"></td>
                                                <td style="width: 60%; height: 2px; background: #7B6B9E; opacity: 0.4;"></td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                        <!-- Right accent strip -->
                        <td style="width: 3px; background: linear-gradient(180deg, #D4A5A5 0%, rgba(212,165,165,0.3) 100%); border-radius: 0 2px 2px 0;"></td>
                    </tr>
                </table>
            </td>

            <!-- Text Content -->
            <td style="vertical-align: middle;">
                <!-- Name with creative spacing -->
                <div style="margin-bottom: 4px;">
                    <span style="font-size: 26px; font-weight: 700; color: #1A1A1A; letter-spacing: -0.5px; line-height: 1;">Sean</span>
                    <span style="font-size: 26px; font-weight: 300; color: #3D5A4C; letter-spacing: 0.5px; line-height: 1; margin-left: 4px;">Canela</span>
                </div>

                <!-- Title with color blocks -->
                <div style="margin: 10px 0 16px 0;">
                    <table cellpadding="0" cellspacing="0" border="0">
                        <tr>
                            <td style="padding: 4px 0 4px 8px; background: rgba(123,107,158,0.08); border-left: 2px solid #7B6B9E;">
                                <span style="font-size: 9px; font-weight: 600; color: #7B6B9E; letter-spacing: 1.5px; text-transform: uppercase;">Founder of Afterharvest</span>
                            </td>
                        </tr>
                    </table>
                </div>

                <!-- Logo with creative underline -->
                <div style="margin-bottom: 6px;">
                    <img src="data:image/png;base64,YOUR_LOGO_BASE64" alt="Afterharvest" style="width: 140px; height: auto; display: block; opacity: 0.82;">
                </div>

                <!-- Abstract accent -->
                <table cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <td style="width: 16px; height: 3px; background: #3D5A4C; opacity: 0.5; border-radius: 2px;"></td>
                        <td style="width: 8px;"></td>
                        <td style="width: 24px; height: 3px; background: #D4A5A5; opacity: 0.4; border-radius: 2px;"></td>
                        <td style="width: 6px;"></td>
                        <td style="width: 8px; height: 3px; background: #7B6B9E; opacity: 0.5; border-radius: 2px;"></td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
