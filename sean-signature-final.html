<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- AFTERHARVEST SIGNATURE - Clean & Sophisticated -->
    <table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; font-size: 14px; line-height: 1.4; color: #2C2C2C; max-width: 460px;">
        <tr>
            <!-- Photo Column -->
            <td style="vertical-align: middle; padding-right: 20px;">
                <!-- Photo with subtle gradient shadow -->
                <table cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <td style="padding: 4px; background: linear-gradient(135deg, rgba(61,90,76,0.06) 0%, rgba(123,107,158,0.06) 100%); border-radius: 50%;">
                            <img src="data:image/jpeg;base64,YOUR_PHOTO_BASE64" alt="Sean Canela" style="width: 90px; height: 90px; border-radius: 50%; display: block; object-fit: cover; border: 2px solid #FFFFFF; box-shadow: 0 4px 12px rgba(61,90,76,0.15);">
                        </td>
                    </tr>
                </table>
            </td>

            <!-- Text Column -->
            <td style="vertical-align: middle;">
                <!-- Name with subtle color accent -->
                <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 4px;">
                    <tr>
                        <td>
                            <span style="font-size: 22px; font-weight: 700; color: #1A1A1A; letter-spacing: -0.3px; line-height: 1.1;">Sean</span>
                            <span style="font-size: 22px; font-weight: 400; color: #3D5A4C; letter-spacing: 0px; line-height: 1.1; margin-left: 3px;">Canela</span>
                        </td>
                    </tr>
                </table>

                <!-- Title -->
                <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 10px;">
                    <tr>
                        <td style="padding: 2px 0;">
                            <span style="font-size: 10px; font-weight: 600; color: #7B6B9E; letter-spacing: 1.2px; text-transform: uppercase;">Founder of Afterharvest</span>
                        </td>
                    </tr>
                </table>

                <!-- Subtle divider -->
                <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 10px;">
                    <tr>
                        <td style="width: 24px; height: 1px; background: #3D5A4C; opacity: 0.3;"></td>
                        <td style="width: 4px;"></td>
                        <td style="width: 20px; height: 1px; background: #7B6B9E; opacity: 0.25;"></td>
                    </tr>
                </table>

                <!-- Logo -->
                <table cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <td>
                            <img src="data:image/png;base64,YOUR_LOGO_BASE64" alt="Afterharvest" style="width: 120px; height: auto; display: block; opacity: 0.75;">
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
