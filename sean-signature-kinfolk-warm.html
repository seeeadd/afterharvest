<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- AFTERHARVEST SIGNATURE - Kinfolk Warmth -->
    <table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; max-width: 500px; margin: 0; border-spacing: 0;">
        <tr>
            <td style="vertical-align: middle;">
                <!-- Entire signature in subtle warm container -->
                <table cellpadding="0" cellspacing="0" border="0" style="background: linear-gradient(135deg, rgba(61,90,76,0.03) 0%, rgba(212,165,165,0.03) 100%); padding: 20px 24px; border-radius: 6px; border-left: 3px solid #3D5A4C;">
                    <tr>
                        <!-- Photo side -->
                        <td style="vertical-align: middle; padding-right: 28px;">
                            <!-- Photo with layered border treatment -->
                            <table cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td style="padding: 4px; background: #FFFFFF; border-radius: 50%; box-shadow: 0 4px 16px rgba(61,90,76,0.12);">
                                        <table cellpadding="0" cellspacing="0" border="0">
                                            <tr>
                                                <td style="padding: 3px; background: linear-gradient(135deg, #7B6B9E 0%, #D4A5A5 50%, #3D5A4C 100%); border-radius: 50%;">
                                                    <img src="data:image/jpeg;base64,YOUR_PHOTO_BASE64" alt="Sean Canela" style="width: 96px; height: 96px; border-radius: 50%; display: block; object-fit: cover; border: 3px solid #FFFFFF;">
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>

                        <!-- Text side -->
                        <td style="vertical-align: middle;">
                            <!-- Name - editorial style -->
                            <div style="margin-bottom: 8px;">
                                <div style="font-size: 24px; font-weight: 600; color: #2C2C2C; letter-spacing: 0.3px; line-height: 1.1;">
                                    Sean Canela
                                </div>
                            </div>

                            <!-- Decorative separator -->
                            <div style="margin-bottom: 10px;">
                                <table cellpadding="0" cellspacing="0" border="0">
                                    <tr>
                                        <td style="width: 4px; height: 4px; background: #3D5A4C; border-radius: 50%;"></td>
                                        <td style="width: 6px;"></td>
                                        <td style="width: 30px; height: 1px; background: rgba(123,107,158,0.3);"></td>
                                        <td style="width: 6px;"></td>
                                        <td style="width: 4px; height: 4px; background: #D4A5A5; border-radius: 50%;"></td>
                                    </tr>
                                </table>
                            </div>

                            <!-- Title -->
                            <div style="margin-bottom: 12px;">
                                <span style="font-size: 10px; font-weight: 500; color: #7B6B9E; letter-spacing: 1.2px; font-style: italic;">Founder of</span>
                            </div>

                            <!-- Logo -->
                            <div>
                                <img src="data:image/png;base64,YOUR_LOGO_BASE64" alt="Afterharvest" style="width: 135px; height: auto; display: block; opacity: 0.8;">
                            </div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
