<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <!-- PREMIUM EDITORIAL SIGNATURE - Vertical Rule Design -->
    <table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; color: #2C2C2C; max-width: 500px; background: rgba(123,107,158,0.02); padding: 20px 24px; border-radius: 3px;">
        <tr>
            <td style="vertical-align: top; padding-right: 0;">
                <!-- Profile Photo - Soft Rounded Square with Shadow -->
                <div style="position: relative;">
                    <img src="data:image/png;base64,YOUR_PROFILE_PHOTO_BASE64_HERE" alt="Profile" style="width: 72px; height: 72px; border-radius: 10px; display: block; object-fit: cover; border: 2px solid #FFFFFF; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
                </div>
            </td>
            <td style="vertical-align: top; padding: 0 20px;">
                <!-- Vertical Hairline Divider -->
                <div style="width: 1px; height: 100%; background: linear-gradient(to bottom, rgba(123,107,158,0.15) 0%, rgba(123,107,158,0.4) 50%, rgba(123,107,158,0.15) 100%); min-height: 72px;"></div>
            </td>
            <td style="vertical-align: top; padding-left: 4px;">
                <!-- Name - Large, tracked out -->
                <div style="font-size: 18px; font-weight: 600; color: #2C2C2C; margin: 0 0 4px 0; line-height: 1.2; letter-spacing: 0.5px;">
                    Your Name
                </div>

                <!-- Title - All Caps, Tracked -->
                <div style="font-size: 11px; font-weight: 500; color: #6B6B6B; margin: 0 0 10px 0; line-height: 1.3; letter-spacing: 1.2px; text-transform: uppercase;">
                    Your Title
                </div>

                <!-- Thin Horizontal Rule -->
                <div style="width: 40px; height: 1px; background: rgba(123,107,158,0.25); margin: 0 0 10px 0;"></div>

                <!-- Company Name - Brand Color -->
                <div style="font-size: 14px; font-weight: 600; color: #7B6B9E; margin: 0 0 4px 0; line-height: 1.3; letter-spacing: 0.3px;">
                    Afterharvest
                </div>

                <!-- Description - Refined -->
                <div style="font-size: 12px; color: #6B6B6B; margin: 0 0 12px 0; line-height: 1.5; max-width: 280px; letter-spacing: 0.1px;">
                    Customer retention for community builders
                </div>

                <!-- Logo - Small, Understated -->
                <div style="margin-top: 8px; opacity: 0.75;">
                    <img src="data:image/png;base64,YOUR_LOGO_BASE64_HERE" alt="Afterharvest" style="width: 85px; height: auto; display: block;">
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
