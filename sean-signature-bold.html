<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- AFTERHARVEST SIGNATURE - Bold Asymmetric Design -->
    <table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; max-width: 480px; margin: 0; border-spacing: 0;">
        <tr>
            <!-- Left: Colored Accent + Text -->
            <td style="vertical-align: top; position: relative;">
                <table cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <!-- Gradient Accent Bar -->
                        <td style="vertical-align: top; padding-right: 16px;">
                            <div style="width: 3px; height: 85px; background: linear-gradient(180deg, #7B6B9E 0%, #D4A5A5 100%); border-radius: 2px; opacity: 0.85;"></div>
                        </td>

                        <!-- Text Content -->
                        <td style="vertical-align: middle;">
                            <!-- Name - Large & Bold -->
                            <div style="font-size: 22px; font-weight: 700; color: #1A1A1A; letter-spacing: -0.3px; line-height: 1.1; margin-bottom: 8px;">
                                Sean Canela
                            </div>

                            <!-- Title with Logo Inline -->
                            <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 10px;">
                                <tr>
                                    <td style="vertical-align: middle; padding-right: 8px;">
                                        <div style="font-size: 12px; font-weight: 500; color: #7B6B9E; letter-spacing: 0.5px; line-height: 1.3;">
                                            Founder of
                                        </div>
                                    </td>
                                    <td style="vertical-align: middle;">
                                        <img src="data:image/png;base64,YOUR_LOGO_BASE64" alt="Afterharvest" style="height: 16px; width: auto; display: block; opacity: 0.85;">
                                    </td>
                                </tr>
                            </table>

                            <!-- Geometric Accent -->
                            <div style="display: inline-block; margin-top: 2px;">
                                <div style="width: 28px; height: 2px; background: linear-gradient(90deg, #7B6B9E 0%, transparent 100%); border-radius: 1px;"></div>
                            </div>
                        </td>
                    </tr>
                </table>
            </td>

            <!-- Right: Photo with Gradient Overlay Effect -->
            <td style="vertical-align: middle; padding-left: 24px; position: relative;">
                <div style="position: relative; display: inline-block;">
                    <!-- Photo -->
                    <img src="data:image/jpeg;base64,YOUR_PHOTO_BASE64" alt="Sean Canela" style="width: 80px; height: 80px; border-radius: 12px; display: block; object-fit: cover; box-shadow: 0 4px 14px rgba(123, 107, 158, 0.2);">

                    <!-- Corner Accent Shape -->
                    <div style="position: absolute; top: -3px; right: -3px; width: 20px; height: 20px; background: linear-gradient(135deg, #D4A5A5 0%, #7B6B9E 100%); border-radius: 0 12px 0 6px; opacity: 0.75;"></div>

                    <!-- Bottom Accent Dot -->
                    <div style="position: absolute; bottom: -2px; left: -2px; width: 6px; height: 6px; background: #7B6B9E; border-radius: 50%; border: 1px solid #FFFFFF;"></div>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
