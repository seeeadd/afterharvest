<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <!-- MINIMAL LUXURY SIGNATURE - Ultimate Sophistication -->
    <table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; color: #2C2C2C; max-width: 520px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 18px;">
        <tr>
            <td style="vertical-align: top; padding-right: 24px;">
                <!-- Profile Photo - Rounded Square Premium -->
                <div style="position: relative; display: inline-block;">
                    <img src="data:image/png;base64,YOUR_PROFILE_PHOTO_BASE64_HERE" alt="Profile" style="width: 76px; height: 76px; border-radius: 8px; display: block; object-fit: cover; box-shadow: 0 3px 10px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);">
                    <!-- Corner Accent -->
                    <div style="position: absolute; top: -2px; right: -2px; width: 16px; height: 16px; background: #7B6B9E; border-radius: 0 8px 0 8px; opacity: 0.85;"></div>
                </div>
            </td>
            <td style="vertical-align: top; padding-left: 0; padding-top: 4px;">
                <!-- Name - Large & Luxurious -->
                <div style="font-size: 19px; font-weight: 600; color: #2C2C2C; margin: 0 0 3px 0; line-height: 1.2; letter-spacing: 0.8px;">
                    Your Name
                </div>

                <!-- Title & Company - Inline with Divider -->
                <div style="margin: 0 0 13px 0; line-height: 1.4;">
                    <span style="font-size: 12px; font-weight: 500; color: #6B6B6B; letter-spacing: 1.2px; text-transform: uppercase;">Your Title</span>
                    <span style="font-size: 12px; color: rgba(123,107,158,0.4); padding: 0 8px;">·</span>
                    <span style="font-size: 13px; font-weight: 600; color: #7B6B9E; letter-spacing: 0.3px;">Afterharvest</span>
                </div>

                <!-- Description with Premium Spacing -->
                <div style="font-size: 13px; color: #6B6B6B; margin: 0 0 16px 0; line-height: 1.65; max-width: 300px; letter-spacing: 0.1px;">
                    Customer retention for community builders
                </div>

                <!-- Bottom Section: Logo with Geometric Accent -->
                <table cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <td style="vertical-align: middle; padding-right: 13px;">
                            <img src="data:image/png;base64,YOUR_LOGO_BASE64_HERE" alt="Afterharvest" style="width: 88px; height: auto; display: block; opacity: 0.7;">
                        </td>
                        <td style="vertical-align: middle;">
                            <!-- Minimal Geometric Accent -->
                            <div style="width: 4px; height: 4px; background: #7B6B9E; border-radius: 1px; opacity: 0.5;"></div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
